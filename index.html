<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MooManager - ระบบจัดการฟาร์มวัวนม</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col h-screen overflow-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-cow text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide">MooManager</h1>
        </div>
        <button id="btn-export" class="p-2 rounded-full hover:bg-blue-700 transition flex items-center gap-1" title="Export Data">
            <i class="ph ph-export text-xl"></i>
            <span class="text-xs font-medium hidden sm:inline">Export CSV</span>
        </button>
    </header>

    <main id="app-content" class="flex-1 overflow-y-auto p-4 pb-24 no-scrollbar">
        </main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around p-2 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-10">
        <button class="nav-btn active flex flex-col items-center p-2 w-1/4 text-blue-600 transition-colors" data-target="dashboard">
            <i class="ph-fill ph-squares-four text-2xl mb-1 transition-transform"></i>
            <span class="text-[10px] font-medium">ภาพรวม</span>
        </button>
        <button class="nav-btn flex flex-col items-center p-2 w-1/4 text-gray-400 hover:text-blue-500 transition-colors" data-target="cows">
            <i class="ph ph-list-numbers text-2xl mb-1 transition-transform"></i>
            <span class="text-[10px] font-medium">ฝูงวัว</span>
        </button>
        <button class="nav-btn flex flex-col items-center p-2 w-1/4 text-gray-400 hover:text-blue-500 transition-colors" data-target="milk">
            <i class="ph ph-drop text-2xl mb-1 transition-transform"></i>
            <span class="text-[10px] font-medium">น้ำนม</span>
        </button>
        <button class="nav-btn flex flex-col items-center p-2 w-1/4 text-gray-400 hover:text-blue-500 transition-colors" data-target="inventory">
            <i class="ph ph-package text-2xl mb-1 transition-transform"></i>
            <span class="text-[10px] font-medium">สต็อก</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
